spring:
  application:
    name: poop-vibe-app
  datasource:
    url: jdbc:h2:file:./data/poop-vibe;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Poop Vibe app
    description: Spring Boot API for sessions, friends, feed, stats, devices, and activity logs.
    version: 0.1.0

app:
  public-host: ${APP_PUBLIC_HOST:}

server:
  port: 8080
  servlet:
    context-path: /
