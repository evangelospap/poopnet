spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
  application:
    name: poop-vibe-app
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:54330/poop_vibes}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  flyway:
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Poop Vibe app
    description: Spring Boot API for sessions, friends, feed, stats, devices, and activity logs.
    version: 0.1.0

app:
  public-host: ${APP_PUBLIC_HOST:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3999,http://localhost:3000,http://localhost:3001}
  push:
    public-key: ${APP_PUSH_PUBLIC_KEY:}
    private-key: ${APP_PUSH_PRIVATE_KEY:}
    subject: ${APP_PUSH_SUBJECT:mailto:hello@poopvibe.local}
    ttl-seconds: ${APP_PUSH_TTL_SECONDS:3600}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
